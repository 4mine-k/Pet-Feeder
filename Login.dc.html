<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Connectez-vous pour gérer le distributeur connecté de votre compagnon.">
<meta name="theme-color" content="#1B1B28">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pet Feeder">
<meta property="og:type" content="website">
<meta property="og:title" content="Pet Feeder — Connexion">
<meta property="og:description" content="Distributeur automatique connecté pour votre animal.">
<meta property="og:image" content="./icon.svg">
<meta property="og:locale" content="fr_FR">
<title>Pet Feeder — Connexion</title>
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<link rel="apple-touch-icon" href="./icon.svg">
<link rel="manifest" href="./manifest.json">
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("./service-worker.js").catch(function () {});
    });
  }
</script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    body { margin: 0; padding: 0; }
  </style>
</helmet>

<!-- Outer wrapper -->
<div style="min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(168deg, #1B1B28 0%, #24243A 38%, #2A2A3E 60%, #1B1B28 100%); padding: 32px 20px; box-sizing: border-box; position: relative; overflow: hidden">

  <!-- Subtle ambient glow -->
  <div style="position: absolute; top: -120px; right: -80px; width: 320px; height: 320px; border-radius: 50%; background: radial-gradient(circle, rgba(201,169,110,0.08) 0%, transparent 70%); pointer-events: none"></div>
  <div style="position: absolute; bottom: -100px; left: -60px; width: 280px; height: 280px; border-radius: 50%; background: radial-gradient(circle, rgba(201,169,110,0.05) 0%, transparent 70%); pointer-events: none"></div>

  <!-- Card -->
  <div style="width: 100%; max-width: 400px; background: linear-gradient(175deg, rgba(255,255,255,0.055) 0%, rgba(255,255,255,0.025) 100%); border: 1px solid rgba(255,255,255,0.07); border-radius: 24px; padding: 48px 36px 44px; box-sizing: border-box; backdrop-filter: blur(40px); animation: fadeInUp 0.8s ease-out both">

    <!-- Logo mark -->
    <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: 40px">
      <div style="width: 72px; height: 72px; border-radius: 20px; background: linear-gradient(135deg, #C9A96E 0%, #B8935A 50%, #D4B87A 100%); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; box-shadow: 0 8px 32px rgba(201,169,110,0.2), 0 2px 8px rgba(0,0,0,0.3)">
        <svg width="38" height="38" viewBox="0 0 38 38" fill="none">
          <!-- Minimalist cat silhouette -->
          <path d="M8 30 C8 30 7 18 10 13 C11.5 10 13 8 14 5 C14.5 3.5 16 3.5 16 5.5 L16 12 C16 12 17.5 10.5 19 10.5 C20.5 10.5 22 12 22 12 L22 5.5 C22 3.5 23.5 3.5 24 5 C25 8 26.5 10 28 13 C31 18 30 30 30 30" stroke="#1B1B28" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="rgba(27,27,40,0.15)"/>
          <!-- Eyes -->
          <circle cx="15" cy="18" r="1.5" fill="#1B1B28"/>
          <circle cx="23" cy="18" r="1.5" fill="#1B1B28"/>
          <!-- Nose -->
          <path d="M18 21 L19 22 L20 21" stroke="#1B1B28" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- Whiskers -->
          <line x1="8" y1="19" x2="13" y2="19.5" stroke="#1B1B28" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
          <line x1="8" y1="22" x2="13" y2="21" stroke="#1B1B28" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
          <line x1="25" y1="19.5" x2="30" y2="19" stroke="#1B1B28" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
          <line x1="25" y1="21" x2="30" y2="22" stroke="#1B1B28" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
        </svg>
      </div>

      <!-- Brand name -->
      <div style="font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 600; color: #F2EDE7; letter-spacing: 0.5px; margin-bottom: 6px">Pet Feeder</div>
      <div style="font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 400; color: rgba(242,237,231,0.4); letter-spacing: 3px; text-transform: uppercase">Smart Nutrition</div>
    </div>

    <!-- Divider -->
    <div style="height: 1px; background: linear-gradient(90deg, transparent, rgba(201,169,110,0.2), transparent); margin-bottom: 36px"></div>

    <!-- Welcome text -->
    <div style="text-align: center; margin-bottom: 32px">
      <div style="font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 500; color: #F2EDE7; margin-bottom: 8px">Bon retour</div>
      <div style="font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 300; color: rgba(242,237,231,0.45); line-height: 1.5">Connectez-vous pour gérer le bien-être de votre compagnon</div>
    </div>

    <!-- Email field -->
    <div style="margin-bottom: 20px">
      <label style="display: block; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; color: rgba(201,169,110,0.7); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px">Adresse e-mail</label>
      <div style="position: relative">
        <div style="position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: rgba(242,237,231,0.3)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="3"/>
            <path d="M2 7 L12 13 L22 7"/>
          </svg>
        </div>
        <input type="email" placeholder="votre@email.com" style="width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 16px 18px 16px 48px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 400; color: #F2EDE7; outline: none; transition: border-color 0.3s ease, box-shadow 0.3s ease"
          style-focus="border-color: rgba(201,169,110,0.5); box-shadow: 0 0 0 3px rgba(201,169,110,0.08)"/>
      </div>
    </div>

    <!-- Password field -->
    <div style="margin-bottom: 12px">
      <label style="display: block; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; color: rgba(201,169,110,0.7); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px">Mot de passe</label>
      <div style="position: relative">
        <div style="position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: rgba(242,237,231,0.3)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="3"/>
            <path d="M7 11 V7 C7 4.2 9.2 2 12 2 C14.8 2 17 4.2 17 7 V11"/>
            <circle cx="12" cy="16.5" r="1.5"/>
          </svg>
        </div>
        <input type="password" placeholder="••••••••" style="width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 16px 18px 16px 48px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 400; color: #F2EDE7; outline: none; transition: border-color 0.3s ease, box-shadow 0.3s ease; letter-spacing: 3px"
          style-focus="border-color: rgba(201,169,110,0.5); box-shadow: 0 0 0 3px rgba(201,169,110,0.08)"/>
      </div>
    </div>

    <!-- Forgot password -->
    <div style="text-align: right; margin-bottom: 32px">
      <a href="#" style="font-family: 'DM Sans', sans-serif; font-size: 12.5px; font-weight: 400; color: rgba(201,169,110,0.6); text-decoration: none; transition: color 0.2s ease"
        style-hover="color: rgba(201,169,110,0.9)">Mot de passe oublié ?</a>
    </div>

    <!-- Sign in button -->
    <button style="width: 100%; padding: 17px 24px; background: linear-gradient(135deg, #C9A96E 0%, #B8935A 60%, #D4B87A 100%); border: none; border-radius: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; color: #1B1B28; cursor: pointer; letter-spacing: 0.8px; transition: transform 0.2s ease, box-shadow 0.2s ease; box-shadow: 0 4px 20px rgba(201,169,110,0.25), 0 1px 4px rgba(0,0,0,0.2)"
      style-hover="transform: translateY(-1px); box-shadow: 0 8px 32px rgba(201,169,110,0.35), 0 2px 8px rgba(0,0,0,0.25)"
      style-active="transform: translateY(0.5px); box-shadow: 0 2px 12px rgba(201,169,110,0.2)">
      Se connecter
    </button>

    <!-- Divider with "ou" -->
    <div style="display: flex; align-items: center; gap: 16px; margin: 28px 0">
      <div style="flex: 1; height: 1px; background: rgba(255,255,255,0.06)"></div>
      <span style="font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 400; color: rgba(242,237,231,0.25); text-transform: lowercase">ou</span>
      <div style="flex: 1; height: 1px; background: rgba(255,255,255,0.06)"></div>
    </div>

    <!-- Social login buttons -->
    <div style="display: flex; gap: 12px; margin-bottom: 32px">
      <button style="flex: 1; padding: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s ease, border-color 0.2s ease"
        style-hover="background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.12)">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
      </button>
      <button style="flex: 1; padding: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s ease, border-color 0.2s ease"
        style-hover="background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.12)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#F2EDE7">
          <path d="M18.71 19.5C17.88 20.74 17 21.95 15.66 21.97C14.32 21.99 13.89 21.18 12.37 21.18C10.84 21.18 10.37 21.95 9.1 21.99C7.79 22.03 6.8 20.68 5.96 19.47C4.25 16.97 2.94 12.45 4.7 9.39C5.57 7.87 7.13 6.91 8.82 6.89C10.1 6.87 11.32 7.75 12.11 7.75C12.89 7.75 14.37 6.68 15.92 6.84C16.57 6.87 18.39 7.1 19.56 8.82C19.47 8.88 17.39 10.1 17.41 12.63C17.44 15.65 20.06 16.66 20.09 16.67C20.06 16.74 19.67 18.11 18.71 19.5ZM13 3.5C13.73 2.67 14.94 2.04 15.94 2C16.07 3.17 15.6 4.35 14.9 5.19C14.21 6.04 13.07 6.7 11.95 6.61C11.8 5.46 12.36 4.26 13 3.5Z"/>
        </svg>
      </button>
    </div>

    <!-- Sign up link -->
    <div style="text-align: center">
      <span style="font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 300; color: rgba(242,237,231,0.35)">Pas encore de compte ? </span>
      <a href="#" style="font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 500; color: #C9A96E; text-decoration: none; transition: color 0.2s ease"
        style-hover="color: #D4B87A">Créer un compte</a>
    </div>

  </div>

  <!-- Footer -->
  <div style="margin-top: 40px; text-align: center; animation: fadeInUp 0.8s ease-out 0.3s both">
    <div style="font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 300; color: rgba(242,237,231,0.2); letter-spacing: 0.5px">© 2026 Pet Feeder · Tous droits réservés</div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;430&quot;,&quot;height&quot;:&quot;932&quot;}}"></script>

<script src="js/auth.js"></script>
<script src="js/realtime.js"></script>
<script src="js/controls.js"></script>
<script src="js/feedback.js"></script>
</body>
</html>
